basePath: /
definitions:
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ChangePasswordInput:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.LoginInput:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.OTPType:
    enum:
    - email_verification
    - password_reset
    type: string
    x-enum-varnames:
    - OTPTypeEmailVerification
    - OTPTypePasswordReset
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.RefreshInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.RegisterInput:
    properties:
      business_name:
        maxLength: 200
        minLength: 2
        type: string
      business_type:
        enum:
        - retail
        - fnb
        - service
        - cafe
        - restaurant
        - general
        type: string
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - business_name
    - business_type
    - email
    - name
    - password
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ResendOTPInput:
    properties:
      email:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.OTPType'
        enum:
        - email_verification
        - password_reset
    required:
    - email
    - type
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ResetPasswordInput:
    properties:
      email:
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      otp:
        type: string
    required:
    - email
    - new_password
    - otp
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.UpdateProfileInput:
    properties:
      avatar_url:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        type: string
    type: object
  github_com_extendedsynaptic_xynpos_auth-service_internal_domain.VerifyEmailInput:
    properties:
      otp:
        type: string
    required:
    - otp
    type: object
  response.ErrorBody:
    properties:
      code:
        type: string
      details:
        items:
          $ref: '#/definitions/response.ValidationError'
        type: array
      http_status:
        type: integer
      message:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
      success:
        type: boolean
    type: object
  response.SuccessResponse:
    properties:
      data: {}
      success:
        type: boolean
    type: object
  response.ValidationError:
    properties:
      field:
        type: string
      message:
        type: string
      value:
        type: string
    type: object
host: localhost:8001
info:
  contact: {}
  description: Authentication and Authorization service for XynPOS
  title: XynPOS Auth Service API
  version: "1.0"
paths:
  /v1/auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Old and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ChangePasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Change user password
      tags:
      - Auth
  /v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: Request password reset OTP
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login with email and password
      tags:
      - Auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Logout and revoke refresh token
      tags:
      - Auth
  /v1/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
    patch:
      consumes:
      - application/json
      parameters:
      - description: Profile fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.UpdateProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register new tenant and owner account
      tags:
      - Auth
  /v1/auth/resend-otp:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email and OTP type
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ResendOTPInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: Resend OTP code
      tags:
      - Auth
  /v1/auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: OTP and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.ResetPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Reset password using OTP
      tags:
      - Auth
  /v1/auth/sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: List active sessions
      tags:
      - Auth
  /v1/auth/sessions/{session_id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Revoke a specific session
      tags:
      - Auth
  /v1/auth/verify-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: OTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_extendedsynaptic_xynpos_auth-service_internal_domain.VerifyEmailInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Verify email with OTP
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
