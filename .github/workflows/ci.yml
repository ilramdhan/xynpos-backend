name: CI — XynPOS Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  GO_VERSION: "1.22"
  COVERAGE_THRESHOLD: 70

jobs:
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: backend/services/${{ matrix.service }}
          args: --timeout 5m

  # ────────────────────────────────────────────────────────────────
  test-auth-service:
    name: Test — auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/services/auth-service/go.sum

      - name: Run tests with coverage
        run: |
          go test ./... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic
          echo "=== Coverage Summary ===" 
          go tool cover -func=coverage.out | tail -5

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          # Check testable layers only (handler + usecase)
          HANDLER_COV=$(go tool cover -func=coverage.out | grep "handler" | awk '{sum+=$3; count++} END {print sum/count}' | sed 's/%//')
          USECASE_COV=$(go tool cover -func=coverage.out | grep "usecase" | awk '{sum+=$3; count++} END {print sum/count}' | sed 's/%//')
          echo "Handler layer: ${HANDLER_COV}%, Usecase layer: ${USECASE_COV}%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/auth-service/coverage.out
          flags: auth-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  test-tenant-service:
    name: Test — tenant-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/tenant-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/services/tenant-service/go.sum

      - name: Run tests with coverage
        run: |
          go test ./... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/tenant-service/coverage.out
          flags: tenant-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-auth-service, test-tenant-service]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Verify proto files compile
        run: |
          cd backend/shared
          protoc \
            --go_out=. \
            --go_opt=paths=source_relative \
            --go-grpc_out=. \
            --go-grpc_opt=paths=source_relative \
            proto/auth/auth.proto
