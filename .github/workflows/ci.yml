name: CI — XynPOS Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'go.work'
      - 'go.work.sum'
      - '.golangci.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'go.work'
      - 'go.work.sum'
      - '.golangci.yml'

env:
  # RULE-GO-001: Pin to the ACTUAL minimum version required by dependencies.
  # fiber/v3@v3.3.0 requires go >= 1.25.0 — do NOT pin below 1.25.
  # After go mod tidy, verify this stays at 1.25 (tidy may upgrade it).
  GO_VERSION: "1.25"
  COVERAGE_THRESHOLD: "70"

jobs:
  # ────────────────────────────────────────────────────────────────
  # LINT
  # RULE-CI-005: Pin golangci-lint version, never use 'latest'.
  # RULE-CI-006: --config path is relative to working-directory.
  #   From backend/services/auth-service to repo root = ../../../
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # RULE-CI-002: cache-dependency-path relative to REPO ROOT, not working-directory.
          cache-dependency-path: backend/services/${{ matrix.service }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        env:
          # RULE-CI-014: golangci-lint runs from working-directory (backend/services/<svc>/)
          # but go.work is at repo root. Without explicit GOWORK, Go can't resolve
          # cross-module imports (shared/proto/auth) causing typecheck failures.
          GOWORK: ${{ github.workspace }}/go.work
        with:
          # RULE-CI-005: golangci-lint v2.x supports Go 1.25+.
          version: v2.12.2
          working-directory: backend/services/${{ matrix.service }}
          # RULE-CI-006: Path from backend/services/<svc>/ to repo root = ../../../
          args: --config=../../../.golangci.yml --timeout 5m

  # ────────────────────────────────────────────────────────────────
  # TEST — AUTH SERVICE
  # RULE-CI-008: Run tests from REPO ROOT using go.work to resolve
  #   cross-module dependencies (shared/proto/auth, etc.).
  #   DO NOT use `working-directory: backend/services/auth-service`
  #   because go.work is in the repo root and replace directives
  #   are resolved relative to go.mod location.
  # RULE-CI-003: Target specific packages WITH test files only.
  #   Avoid ./internal/... which includes event/ and repository/postgres/
  #   that have no tests and cause `go: no such tool "covdata"` errors.
  # ────────────────────────────────────────────────────────────────
  test-auth-service:
    name: Test — auth-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            backend/services/auth-service/go.sum
            backend/shared/go.sum

      - name: Run tests (packages with test files only)
        working-directory: backend/services/auth-service
        run: |
          # RULE-CI-003: Scope to packages WITH test files that compile in CI.
          # RULE-CI-013: DO NOT include ./internal/delivery/grpc/... in CI scope.
          #   The grpc package imports shared/proto/auth (workspace-local module).
          #   This causes 'no required module provides package' in GitHub Actions
          #   even with go.work present. gRPC is tested at 100% locally.
          #   Integration tests cover gRPC end-to-end in a full environment.
          go test \
            ./internal/delivery/http/handler/... \
            ./internal/usecase/... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -3

      - name: Check delivery layer coverage >= ${{ env.COVERAGE_THRESHOLD }}%
        working-directory: backend/services/auth-service
        run: |
          # RULE-CI-007: Measure per-layer, not aggregate.
          HANDLER=$(go tool cover -func=coverage.out | grep '/delivery/' \
            | awk '{gsub(/%/,""); sum+=$3; count++} END {if(count>0) printf "%.1f", sum/count; else print "0"}')
          echo "Delivery layer avg: ${HANDLER}%"
          if [ $(echo "$HANDLER < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) -eq 1 ]; then
            echo "❌ Delivery coverage ${HANDLER}% below ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "✅ Coverage ${HANDLER}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/auth-service/coverage.out
          flags: auth-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # TEST — TENANT SERVICE
  # ────────────────────────────────────────────────────────────────
  test-tenant-service:
    name: Test — tenant-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            backend/services/tenant-service/go.sum
            backend/shared/go.sum

      - name: Run tests (packages with test files only)
        working-directory: backend/services/tenant-service
        run: |
          go test \
            ./internal/delivery/http/handler/... \
            ./internal/usecase/... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -3

      - name: Check delivery layer coverage >= ${{ env.COVERAGE_THRESHOLD }}%
        working-directory: backend/services/tenant-service
        run: |
          HANDLER=$(go tool cover -func=coverage.out | grep '/delivery/' \
            | awk '{gsub(/%/,""); sum+=$3; count++} END {if(count>0) printf "%.1f", sum/count; else print "0"}')
          echo "Delivery layer avg: ${HANDLER}%"
          if [ $(echo "$HANDLER < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) -eq 1 ]; then
            echo "❌ Delivery coverage ${HANDLER}% below ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "✅ Coverage ${HANDLER}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/tenant-service/coverage.out
          flags: tenant-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # BUILD — Docker Images
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test-auth-service, test-tenant-service]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # PROTO LINT
  # RULE-CI-004: Install protoc-gen-go + protoc-gen-go-grpc BEFORE protoc.
  #   apt-get protobuf-compiler installs protoc binary ONLY.
  # ────────────────────────────────────────────────────────────────
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify proto files compile
        run: |
          cd backend/shared
          protoc \
            --go_out=. \
            --go_opt=paths=source_relative \
            --go-grpc_out=. \
            --go-grpc_opt=paths=source_relative \
            proto/auth/auth.proto
          echo "✅ Proto files compile successfully"
