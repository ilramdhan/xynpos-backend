name: CI — XynPOS Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  # RULE: Always pin to the same Go version used in go.mod files.
  # Changing this requires updating go.mod in ALL modules simultaneously.
  GO_VERSION: "1.22"
  COVERAGE_THRESHOLD: "70"

jobs:
  # ────────────────────────────────────────────────────────────────
  # LINT
  # RULE: golangci-lint version must be built with Go >= go.mod version.
  #       If go.mod says "go 1.22", use golangci-lint built with >=Go1.22.
  #       Never use `latest` — pin the version for reproducibility.
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # RULE: cache-dependency-path must point to the correct go.sum
          # relative to the repo root, not the working-directory.
          cache-dependency-path: backend/services/${{ matrix.service }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # RULE: Pin golangci-lint version. Must be built with Go >= go.mod version.
          # v1.64.8 is built with Go 1.24 — incompatible with go.mod go 1.26.x.
          # After downgrading go.mod to 1.22, v1.64.8 works fine.
          version: v1.64.8
          working-directory: backend/services/${{ matrix.service }}
          args: --config=../../.golangci.yml --timeout 5m

  # ────────────────────────────────────────────────────────────────
  # TEST — AUTH SERVICE
  # RULE: Use `go test ./internal/...` not `./...` to avoid building
  #       cmd/ and docs/ packages that may have external tool deps
  #       (swag, covdata) not available in CI runners.
  # ────────────────────────────────────────────────────────────────
  test-auth-service:
    name: Test — auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # RULE: cache-dependency-path is relative to the REPO ROOT, not
          # the working-directory. This is a common mistake.
          cache-dependency-path: backend/services/auth-service/go.sum

      - name: Run tests (internal packages only)
        run: |
          # RULE: Use -coverpkg to scope coverage measurement to layers that HAVE tests.
          # Without -coverpkg, domain/ and repository/ (no tests) are included and
          # drag total coverage below 70% threshold even when handler/usecase are at 80%.
          go test ./internal/... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/delivery/...,./internal/usecase/...
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -3

      - name: Check coverage threshold (>= ${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below ${{ env.COVERAGE_THRESHOLD }}% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/auth-service/coverage.out
          flags: auth-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # TEST — TENANT SERVICE
  # ────────────────────────────────────────────────────────────────
  test-tenant-service:
    name: Test — tenant-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/tenant-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/tenant-service/go.sum

      - name: Run tests (internal packages only)
        run: |
          go test ./internal/... \
            -race \
            -count=1 \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/delivery/...,./internal/usecase/...
          echo "=== Coverage Summary ==="
          go tool cover -func=coverage.out | tail -3

      - name: Check coverage threshold (>= ${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below ${{ env.COVERAGE_THRESHOLD }}% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/services/tenant-service/coverage.out
          flags: tenant-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # BUILD — Docker Images
  # Only runs on main/develop after tests pass
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test-auth-service, test-tenant-service]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, tenant-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/xynpos-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # PROTO LINT
  # RULE: Always install protoc-gen-go and protoc-gen-go-grpc BEFORE
  #       running protoc. `apt-get install protobuf-compiler` only
  #       installs the protoc binary, NOT the Go plugins.
  # ────────────────────────────────────────────────────────────────
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install protoc
        run: |
          sudo apt-get update -q
          sudo apt-get install -y protobuf-compiler

      - name: Install Go protoc plugins
        # RULE: Must install both protoc-gen-go AND protoc-gen-go-grpc.
        # Without these, protoc cannot generate Go/gRPC output even if
        # protobuf-compiler is installed.
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "${{ runner.tool_cache }}/go/bin" >> $GITHUB_PATH
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify proto files compile
        run: |
          cd backend/shared
          protoc \
            --go_out=. \
            --go_opt=paths=source_relative \
            --go-grpc_out=. \
            --go-grpc_opt=paths=source_relative \
            proto/auth/auth.proto
          echo "✅ Proto files compile successfully"
