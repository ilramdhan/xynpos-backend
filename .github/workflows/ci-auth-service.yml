name: CI — Auth Service

on:
  push:
    branches: [main, staging, develop]
    paths:
      - "backend/services/auth-service/**"
      - "backend/shared/**"
      - ".github/workflows/ci-auth-service.yml"
  pull_request:
    branches: [main, staging]
    paths:
      - "backend/services/auth-service/**"
      - "backend/shared/**"

env:
  SERVICE_PATH: backend/services/auth-service
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/auth-service
  # RULE-GO-001: Pin to go.mod version. go mod tidy will upgrade — reset manually.
  GO_VERSION: "1.22"

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Lint
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # RULE: cache-dependency-path is relative to REPO ROOT, not working-directory
          cache-dependency-path: backend/services/auth-service/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: ${{ env.SERVICE_PATH }}
          # RULE-CI-006: From backend/services/auth-service to repo root = ../../../
          # NOT ../../ which only goes to backend/ (no .golangci.yml there)
          args: --config=../../../.golangci.yml --timeout=10m

      - name: Security scan (govulncheck)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ──────────────────────────────────────────────────────────────
  # 2. Unit Tests
  # RULE: Use ./internal/... not ./... to exclude cmd/, docs/, and
  # other packages that require external tools (swag, covdata) not
  # available on CI runners.
  # ──────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/auth-service/go.sum

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          # RULE-CI-003: Target only packages WITH test files.
          # RULE-CI-007: Use per-layer coverage, not aggregate.
          # ./internal/... includes event/ and repository/postgres/ (no tests)
          # causing "go: no such tool covdata" errors in CI.
          go test \
            ./internal/delivery/grpc/... \
            ./internal/delivery/http/handler/... \
            ./internal/usecase/... \
            -v -short -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1

      - name: Check coverage threshold (>= 70%)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          # RULE-CI-007: Check per-layer (delivery), not aggregate total.
          HANDLER=$(go tool cover -func=coverage.out | grep '/delivery/' \
            | awk '{gsub(/%/,""); sum+=$3; count++} END {if(count>0) printf "%.1f", sum/count; else print "0"}')
          echo "Delivery layer avg: ${HANDLER}%"
          if [ $(echo "$HANDLER < 70" | bc -l) -eq 1 ]; then
            echo "❌ Coverage ${HANDLER}% is below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage ${HANDLER}% passes threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-auth-service
          path: ${{ env.SERVICE_PATH }}/coverage.out
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 3. Integration Tests
  # ──────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: xynpos_test
          POSTGRES_USER: xynpos
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U xynpos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
        ports:
          - 6379:6379

      nats:
        image: nats:latest
        ports:
          - 4222:4222

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/services/auth-service/go.sum

      - name: Run integration tests
        working-directory: ${{ env.SERVICE_PATH }}
        env:
          DATABASE_URL: postgres://xynpos:test_password@localhost:5432/xynpos_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          NATS_URL: nats://localhost:4222
          JWT_ACCESS_SECRET: test_secret_integration_min32chars!
          JWT_REFRESH_SECRET: test_refresh_secret_integration_32!
          APP_ENV: test
        run: |
          go test ./internal/... -v -run Integration -race -timeout 5m

  # ──────────────────────────────────────────────────────────────
  # 4. Swagger Validation
  # ──────────────────────────────────────────────────────────────
  swagger:
    name: Swagger Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate and validate Swagger docs
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          swag init -g cmd/main.go -o docs --parseDependency --parseInternal
          echo "✅ Swagger docs generated successfully"

  # ──────────────────────────────────────────────────────────────
  # 5. Docker Build + Image Scan
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/auth-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # 6. Deploy to Staging
  # RULE: Do NOT use env.VAR in concurrency.group — env context is NOT
  # available in concurrency expressions. Use a hardcoded string or
  # github context variables only (github.ref, github.sha, etc.)
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-test, docker-build]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    # RULE: concurrency.group cannot use env.* context. Use hardcoded service
    # name or github.* context variables.
    concurrency:
      group: deploy-staging-auth-service-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            docker service update \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging \
              --update-parallelism 1 \
              --update-delay 10s \
              xynpos_auth-service
            echo "✅ Deployed auth-service to staging"

  # ──────────────────────────────────────────────────────────────
  # 7. Deploy to Production
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production-auth-service-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Deploy to production (blue-green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            docker service update \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
              --update-parallelism 1 \
              --update-delay 30s \
              --update-failure-action rollback \
              xynpos_auth-service
            echo "✅ Deployed auth-service to production"
