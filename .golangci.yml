version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck    # includes gosimple (merged in v2)
    - unused
    - gocritic
    - misspell
    - noctx
    - bodyclose
    - gosec
    - revive
    - unconvert
    - unparam
    - prealloc
    - copyloopvar
    - nilerr

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*github.com/gofiber/fiber/v3.App).Listen
        - (*github.com/gofiber/fiber/v3.App).ShutdownWithContext

    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: errorf
          severity: warning

    gosec:
      excludes:
        - G401
        - G501

    misspell:
      locale: US

  # RULE-CI-012: In golangci-lint v2, exclusions are nested under linters.exclusions
  # NOT as a top-level 'exclusions' key (that was removed in v2).
  # Error if top-level: "additional properties 'exclusions' not allowed"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - gosec
          - noctx
      - path: cmd/
        linters:
          - gosec
          - noctx
          - gocritic
      # RULE-CI-013: grpc/ imports shared/proto/auth which can't resolve in CI
      - path: delivery/grpc/
        linters:
          - all
      - path: proto/
        linters:
          - all
      - path: docs/
        linters:
          - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true
