version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  # Default set of linters (replaces the old enable/disable approach in v2)
  default: none
  enable:
    - errcheck       # Check error return values
    - govet          # Report suspicious constructs
    - gosimple       # Simplification suggestions
    - staticcheck    # Static analysis
    - unused         # Find unused code
    - gocritic       # Opinionated code review
    - misspell       # Spell check
    - noctx          # Find HTTP requests without context
    - bodyclose      # Check HTTP response body is closed
    - gosec          # Security issues
    - revive         # Replacement for golint
    - unconvert      # Unnecessary type conversions
    - unparam        # Unused function parameters
    - prealloc       # Slice pre-allocation suggestions
    - copyloopvar    # Replaces exportloopref (since Go1.22)
    - nilerr         # Incorrect nil error returns

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*github.com/gofiber/fiber/v3.App).Listen
        - (*github.com/gofiber/fiber/v3.App).ShutdownWithContext

    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: errorf
          severity: warning

    gosec:
      excludes:
        - G401
        - G501

    misspell:
      locale: US

exclusions:
  rules:
    # Allow errcheck on defers in tests
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - gosec
    # Allow panics in main() and cmd/
    - path: cmd/
      linters:
        - gosec
    # Ignore generated proto files
    - path: proto/
      linters:
        - all
    # Generated swagger docs
    - path: docs/
      linters:
        - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
