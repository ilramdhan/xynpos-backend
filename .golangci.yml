# =============================================================
# golangci-lint configuration for XynPOS Backend
# =============================================================

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  goimports:
    local-prefixes: github.com/extendedsynaptic/xynpos

  govet:
    enable-all: true
    disable:
      - shadow

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G115 # integer conversion (acceptable in our codebase)

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .WithStack(
      - fmt.Errorf(

  revive:
    rules:
      - name: exported
      - name: unexported-return
      - name: error-return
      - name: error-strings
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true

  gocritic:
    enabled-checks:
      - appendAssign
      - appendCombine
      - argOrder
      - badCall
      - badRegexp
      - builtinShadow
      - caseOrder
      - commentedOutCode
      - equalFold
      - evalOrder
      - hugeParam
      - importShadow
      - initClause
      - methodExprCall
      - nestingReduce
      - offBy1
      - paramTypeCombine
      - sloppyLen
      - sprintfQuotedString
      - stringXbytes
      - truncateCmp
      - typeUnparen
      - unlabelStmt
      - unnamedResult
      - unnecessaryBlock
      - weakCond

  exhaustive:
    default-signifies-exhaustive: true

  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true

  cyclop:
    max-complexity: 15

  funlen:
    lines: 100
    statements: 50

  gocognit:
    min-complexity: 20

linters:
  disable-all: true
  enable:
    # Bugs
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused

    # Security
    - gosec

    # Style
    - gofmt
    - goimports
    - revive
    - gocritic
    - exhaustive
    - wrapcheck
    - nolintlint

    # Performance
    - prealloc

    # Complexity
    - cyclop
    - gocognit

    # Safety
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - exportloopref

issues:
  exclude-rules:
    # Test files get more relaxed rules
    - path: "_test\\.go"
      linters:
        - gosec
        - wrapcheck
        - errcheck
        - funlen
        - gocognit

    # Generated files
    - path: "\\.pb\\.go"
      linters:
        - all

    # Mock files (generated by mockery)
    - path: "mock/"
      linters:
        - all

    - path: "mocks/"
      linters:
        - all

    # testutil helpers
    - path: "testutil/"
      linters:
        - wrapcheck
        - gosec

  max-issues-per-linter: 50
  max-same-issues: 10
