version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - gosimple
    - staticcheck
    - unused
    - gocritic
    - misspell
    - noctx
    - bodyclose
    - gosec
    - revive
    - unconvert
    - unparam
    - prealloc
    - copyloopvar
    - nilerr

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*github.com/gofiber/fiber/v3.App).Listen
        - (*github.com/gofiber/fiber/v3.App).ShutdownWithContext

    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: errorf
          severity: warning

    gosec:
      excludes:
        - G401
        - G501

    misspell:
      locale: US

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - gosec
    - path: cmd/
      linters:
        - gosec
    - path: proto/
      linters:
        - all
    - path: docs/
      linters:
        - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 3

# RULE-CI-012: In golangci-lint v2, output.formats must be a MAP not a slice.
# Wrong (v1 style / slice):
#   formats:
#     - format: colored-line-number
# Correct (v2 style / map):
#   formats:
#     text:
#       path: stdout
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true
